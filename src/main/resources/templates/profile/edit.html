<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width: 600px;">
    <h2 class="text-center mb-4">Edit Profile</h2>

    <div th:if="${success}" class="alert alert-success">Profile updated successfully!</div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" action="/profile/edit" th:object="${profile}">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="text" class="form-control" th:field="*{userId}" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" th:field="*{phone}">
        </div>
        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" th:field="*{location}">
        </div>
        <div class="mb-3">
            <label class="form-label">Bio</label>
            <textarea class="form-control" th:field="*{bio}" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-success w-100">Save Profile</button>
    </form>
    <p class="mt-3 text-center"><a href="/profile">Back to Profile</a></p>
</div>
</body>
</html>
