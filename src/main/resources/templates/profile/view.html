<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Marketplace</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/profile">My Profile</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>My Profile</h3>
        </div>
        <div class="card-body">
            <div th:if="${profile}">
                <p><strong>User ID:</strong> <span th:text="${profile.userId}"></span></p>
                <p><strong>Name:</strong> <span th:text="${profile.name}"></span></p>
                <p><strong>Phone:</strong> <span th:text="${profile.phone}"></span></p>
                <p><strong>Location:</strong> <span th:text="${profile.location}"></span></p>
                <p><strong>Bio:</strong> <span th:text="${profile.bio}"></span></p>
                <a href="/profile/edit" class="btn btn-primary">Edit Profile</a>
            </div>
            <div th:if="${!profile}">
                <p>No profile found. <a href="/profile/edit">Create one now</a></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
